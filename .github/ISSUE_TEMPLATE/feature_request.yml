name: 功能建议
description: 提出新功能、交互优化、体验改进等建议。
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请尽量说明这个功能解决什么问题。

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 请描述你遇到的使用痛点。
      placeholder: 例如：我希望播放器有迷你窗口，这样可以一边工作一边控制播放。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你希望的解决方案
      description: 你希望这个功能大概怎么实现？
      placeholder: 例如：增加一个小窗口，只显示封面、歌名、播放/暂停、上一首、下一首。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他可选方案
      description: 有没有其他你能接受的实现方式？
      placeholder: 例如：也可以做成悬浮歌词条。

  - type: dropdown
    id: priority
    attributes:
      label: 你认为这个功能优先级如何？
      options:
        - 很高
        - 中等
        - 较低
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 可以上传截图、参考软件、设计草图等。
